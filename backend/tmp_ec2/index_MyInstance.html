<!DOCTYPE html>
<html>
<head>
    <title>Mock EC2 Web Server</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #080a0f; color: #f4f4f5; padding: 2rem; margin: 0; }
        .card { max-width: 600px; margin: auto; background: #0d1117; padding: 2rem; border-radius: 8px; border: 1px solid #2d3139; }
        h1 { color: #00e5ff; margin-top: 0; }
        pre { background: #161920; padding: 0.75rem; border-radius: 4px; overflow-x: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hey! Local EC2 Web Server is running.</h1>
        <p>Resource: <strong>MyInstance</strong></p>
        <hr style="border: 0; border-top: 1px solid #2d3139; margin: 1.5rem 0;" />
        <h3 style="color:#00e5ff;">Retrieved S3 Data:</h3>
        <div style='margin-bottom:1.5rem;padding:1rem;background:#161920;border-radius:4px;border:1px solid #2d3139;'><div style='color:#a6e3a1;font-weight:bold;margin-bottom:0.5rem;'>📄 Object: config.json (Bucket: my-config-bucket)</div><pre style='margin:0;color:#f4f4f5;'>{"message": "Hello from S3"}</pre></div>
    </div>
</body>
</html>
